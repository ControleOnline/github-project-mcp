name: Developer Project Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  developer-runner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node src/run-with-retry.js npm install
      - run: node src/developer-runner.js
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          GITHUB_RETRY_ATTEMPTS: 3
          GITHUB_RETRY_DELAY_MS: 2000
          GITHUB_RETRY_MAX_DELAY_MS: 15000
          AGENT_DISPATCH_ROLE: developer
          AGENT_PROJECT_ORG: ControleOnline
          AGENT_PROJECT_NUMBER: 1
          AGENT_DRY_RUN: false
          AGENT_WORK_STATUS: Work
          AGENT_LOGIN: copilot-swe-agent
          AGENT_KNOWN_LOGINS: copilot-swe-agent,copilot
          AGENT_COPILOT_BASE_REF: master
          AGENT_COPILOT_MODEL: ''
          AGENT_OUTPUT_DIR: ./.developer-output

      - name: Upload developer snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-project-dispatch
          path: ./.developer-output/agent-project-dispatch-developer.json
