name: DevOps Project Runner

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - '.github/agents/**'
      - 'AGENTS.md'
      - 'automate/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  devops-runner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node src/run-with-retry.js npm install
      - run: node src/devops-runner.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          GITHUB_RETRY_ATTEMPTS: 3
          GITHUB_RETRY_DELAY_MS: 2000
          GITHUB_RETRY_MAX_DELAY_MS: 15000
          AGENT_DISPATCH_ROLE: devops
          AGENT_PROJECT_ORG: ControleOnline
          AGENT_PROJECT_NUMBER: 1
          AGENT_DRY_RUN: false
          AGENT_WORK_STATUS: Work
          AGENT_LOGIN: copilot-swe-agent
          AGENT_KNOWN_LOGINS: copilot-swe-agent,copilot
          AGENT_COPILOT_BASE_REF: master
          AGENT_COPILOT_MODEL: ''
          AGENT_OUTPUT_DIR: ./.devops-output

      - name: Upload DevOps snapshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: devops-project-dispatch
          path: ./.devops-output/agent-project-dispatch-devops.json