name: DevOps Project Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  devops-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run DevOps dispatch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          AGENT_DISPATCH_ROLE: devops
          AGENT_PROJECT_ORG: ControleOnline
          AGENT_PROJECT_NUMBER: 1
          AGENT_DRY_RUN: false
          AGENT_WORK_STATUSES: Work,Working
          AGENT_DEPLOY_STATUSES: Deploy
          AGENT_OUTPUT_DIR: ./.devops-output
        run: node src/devops-runner.js

      - name: Upload DevOps snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devops-project-runner
          path: ./.devops-output/agent-project-dispatch-devops.json
          if-no-files-found: ignore
