name: Direct Push Ingest

on:
  push:
    branches:
      - '**'

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Ingest direct push
        run: node src/direct-push-ingest-runner.js
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          PROJECT_ORG: ControleOnline
          PROJECT_NUMBER: 1
          DEVOPS_UNTRACKED_STATUS: Developer
          PROJECT_REPAIR_STATUS: Developer
          PROJECT_REPAIR_REFS: ControleOnline/cto-mcp#7,ControleOnline/cto-mcp#8,ControleOnline/cto-mcp#9,ControleOnline/cto-mcp#10,ControleOnline/cto-mcp#11,ControleOnline/cto-mcp#12,ControleOnline/app-community#98
