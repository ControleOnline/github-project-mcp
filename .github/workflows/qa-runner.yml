name: QA Project Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  qa-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run QA batch
        run: node src/index.js
        env:
          TOKEN_PROJECTS: ${{ secrets.TOKEN_PROJECTS }}
          QA_PROJECT_ORG: ControleOnline
          QA_PROJECT_NUMBER: 1
          QA_TARGET_STATUS: Quality Assurance
          QA_TASK_LIMIT: 5
