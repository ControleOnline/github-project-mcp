name: QA Project Runner

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'Repository owner'
        required: true
      repo:
        description: 'Repository name'
        required: true
      issue_number:
        description: 'Issue number'
        required: true
      target_status:
        description: 'Target status'
        required: false
        default: 'Quality Assurance'
  schedule:
    - cron: '*/15 * * * *'

jobs:
  qa-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate TOKEN_PROJECTS
        run: |
          if [ -z "$TOKEN_PROJECTS" ]; then
            echo "TOKEN_PROJECTS is not set"
            exit 1
          fi
        env:
          TOKEN_PROJECTS: ${{ secrets.TOKEN_PROJECTS }}

      - name: Run QA action
        run: |
          node src/index.js \
            ${{ inputs.owner || env.QA_ISSUE_OWNER }} \
            ${{ inputs.repo || env.QA_ISSUE_REPO }} \
            ${{ inputs.issue_number || env.QA_ISSUE_NUMBER }} \
            1 \
            "${{ inputs.target_status }}"
        env:
          TOKEN_PROJECTS: ${{ secrets.TOKEN_PROJECTS }}
          QA_PROJECT_ORG: ControleOnline
          QA_PROJECT_NUMBER: 1
