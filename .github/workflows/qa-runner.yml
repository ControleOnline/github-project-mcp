name: QA Project Runner

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/developer-runner.yml'
      - '.github/workflows/qa-runner.yml'
      - '.github/workflows/security-runner.yml'
      - '.github/workflows/devops-runner.yml'
      - '.github/workflows/agent-flow-sync.yml'
      - '.github/workflows/cto-runner.yml'
      - 'automate/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '*/15 * * * *'

jobs:
  qa-runner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node src/run-with-retry.js npm install
      - run: node src/qa-runner.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          GITHUB_RETRY_ATTEMPTS: 3
          GITHUB_RETRY_DELAY_MS: 2000
          GITHUB_RETRY_MAX_DELAY_MS: 15000
          AGENT_DISPATCH_ROLE: qa
          AGENT_PROJECT_ORG: ControleOnline
          AGENT_PROJECT_NUMBER: 1
          AGENT_DRY_RUN: false
          AGENT_WORK_STATUS: Work
          AGENT_LOGIN: copilot-swe-agent
          AGENT_KNOWN_LOGINS: copilot-swe-agent,copilot
          AGENT_COPILOT_BASE_REF: master
          AGENT_COPILOT_MODEL: ''
          AGENT_OUTPUT_DIR: ./.qa-output

      - name: Upload QA snapshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: qa-project-dispatch
          path: ./.qa-output/agent-project-dispatch-qa.json