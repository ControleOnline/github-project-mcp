name: Security Project Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  security-runner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node src/security-runner.js
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          SECURITY_PROJECT_ORG: ControleOnline
          SECURITY_PROJECT_NUMBER: 1
          SECURITY_DRY_RUN: false
          SECURITY_OUTPUT_DIR: ./.security-output
          SECURITY_ANALYST_LOGINS: 'luizkim,copilot-swe-agent'
          SECURITY_USE_COPILOT: true
          SECURITY_COPILOT_BASE_REF: master
          SECURITY_COPILOT_MODEL: ''

      - name: Upload security snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-project-review
          path: ./.security-output/security-project-review.json
