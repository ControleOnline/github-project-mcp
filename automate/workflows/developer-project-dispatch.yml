name: Developer Project Dispatch

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  developer-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run developer project dispatch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          AGENT_DISPATCH_ROLE: developer
          AGENT_PROJECT_ORG: ControleOnline
          AGENT_PROJECT_NUMBER: 1
          AGENT_DRY_RUN: false
          AGENT_WORK_STATUS: Work
          AGENT_LOGIN: copilot-swe-agent
          AGENT_KNOWN_LOGINS: copilot-swe-agent,copilot
          AGENT_COPILOT_BASE_REF: master
          AGENT_COPILOT_MODEL: ''
          AGENT_REDISPATCH_STALE_ACTIVE: true
          AGENT_STALE_AFTER_MINUTES: 30
          AGENT_OUTPUT_DIR: ./.developer-output
        run: node src/developer-runner.js

      - name: Upload developer snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-project-dispatch
          path: ./.developer-output/agent-project-dispatch-developer.json
