name: QA Project Review

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run QA project review snapshot
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          QA_PROJECT_ORG: ControleOnline
          QA_PROJECT_NUMBER: 1
          QA_DRY_RUN: false
          QA_MERGE_TARGETS: all
          QA_OUTPUT_DIR: ./.qa-output
        run: node src/qa-runner.js

      - name: Upload QA snapshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: qa-project-review
          path: ./.qa-output/qa-project-review.json
