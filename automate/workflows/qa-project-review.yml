name: QA Project Review

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run QA project review snapshot
        env:
          TOKEN_PROJECTS: ${{ secrets.TOKEN_PROJECTS }}
          QA_PROJECT_ORG: ControleOnline
          QA_PROJECT_NUMBER: 1
          QA_DRY_RUN: false
          QA_MERGE_TARGETS: all
          QA_OUTPUT_DIR: ./.qa-output
        run: node automate/scripts/qa-project-review.mjs

      - name: Upload QA snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-project-review
          path: ./.qa-output/qa-project-review.json
